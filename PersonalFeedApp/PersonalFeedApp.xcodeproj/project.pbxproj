			shellScript = "set -euo pipefail\n\n# 输入 / 输出（由 Build Phases 的 Input/Output Files 传入）\nJSON_IN=\"${SCRIPT_INPUT_FILE_0}\"          # $(PROJECT_DIR)/Config/ats_whitelist.json\nJSON_OUT=\"${SCRIPT_OUTPUT_FILE_0}\"         # $(DERIVED_FILE_DIR)/ats_whitelist.json\nSTAMP_OUT=\"${SCRIPT_OUTPUT_FILE_1}\"        # $(DERIVED_FILE_DIR)/ats_whitelist_done\n\nPLIST=\"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\"\n\n# 复制 JSON 到派生目录（只允许写 Output Files 指定的路径）\nmkdir -p \"$(dirname \"$JSON_OUT\")\"\ncp -f \"$JSON_IN\" \"$JSON_OUT\"\n\n# 确保 ATS 结构存在\n/usr/libexec/PlistBuddy -c \"Add :NSAppTransportSecurity dict\" \"$PLIST\" 2>/dev/null || true\n/usr/libexec/PlistBuddy -c \"Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool NO\" \"$PLIST\" 2>/dev/null || true\n\n# 重建 NSExceptionDomains\n/usr/libexec/PlistBuddy -c \"Delete :NSAppTransportSecurity:NSExceptionDomains\" \"$PLIST\" 2>/dev/null || true\n/usr/libexec/PlistBuddy -c \"Add :NSAppTransportSecurity:NSExceptionDomains dict\" \"$PLIST\"\n\n# 读取派生目录里的 JSON（沙盒允许）\nDOMAINS=$(python3 - \"$JSON_OUT\" <<'PY'\nimport json,sys\nwith open(sys.argv[1],'r',encoding='utf-8') as f:\n    data=json.load(f)\nfor d in data.get('whitelist',[]):\n    d=d.strip().lower()\n    if d.startswith('www.'): d=d[4:]\n    if d: print(d)\nPY\n)\n\n# 写入每个域名的例外（注意这里只“修改”Info.plist，不把它声明为 Output）\nfor d in $DOMAINS; do\n  /usr/libexec/PlistBuddy -c \"Add :NSAppTransportSecurity:NSExceptionDomains:${d} dict\" \"$PLIST\"\n  /usr/libexec/PlistBuddy -c \"Add :NSAppTransportSecurity:NSExceptionDomains:${d}:NSIncludesSubdomains bool YES\" \"$PLIST\"\n  /usr/libexec/PlistBuddy -c \"Add :NSAppTransportSecurity:NSExceptionDomains:${d}:NSExceptionAllowsInsecureHTTPLoads bool YES\" \"$PLIST\"\n  /usr/libexec/PlistBuddy -c \"Add :NSAppTransportSecurity:NSExceptionDomains:${d}:NSExceptionRequiresForwardSecrecy bool NO\" \"$PLIST\"\ndone\n\n# 生成一个声明过的输出文件，避免“每次都会运行”的警告\necho \"ATS whitelist injected at $(date)\" > \"$STAMP_OUT\"\n";
		};
